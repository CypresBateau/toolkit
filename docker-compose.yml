services:

  # ── 统一推理网关（唯一对外入口）─────────────────────────────────────────────
  gateway:
    build: ./gateway
    image: toolkit-gateway:latest
    container_name: toolkit-gateway
    ports:
      - "9000:9000"                  # 只有这一个端口对外暴露
    environment:
      - TOTAL_GPU_MB=40000           # ← 改成你的 GPU 总显存（MB）
    volumes:
      - ./gateway/tools:/app/tools:ro  # 新增工具只需在宿主机加 config.yaml，无需重建
    networks:
      - toolnet
    depends_on:
      - mavl
      - tool-scale
      - tool-unit
      - tool-mdcalc
    restart: unless-stopped

  # ── MAVL（B 类，独立环境）────────────────────────────────────────────────────
  mavl:
    build:
      context: ./MAVL
      dockerfile: serving/Dockerfile.serving
    image: mavl-serving:latest
    container_name: mavl-serving
    expose:
      - "8000"                       # 仅内网可达，外部无法直接访问
    volumes:
      - /data/wxb/toolkit/MAVL:/workspace/MAVL
      - /home/tx/.cache/huggingface:/root/.cache/huggingface
      - /home/tx/.cache/torch:/root/.cache/torch
    env_file:
      - ./MAVL/serving/.env
    shm_size: "4g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - toolnet
    restart: unless-stopped

  # ── 医疗评分计算器（44 个，纯 CPU）──────────────────────────────────────────
  tool-scale:
    build: ./med-calc
    image: med-calc:latest
    container_name: tool-scale
    expose:
      - "8000"
    environment:
      - TOOL_JSON_PATH=/data/tool_scale.json
      - TOOL_CATEGORY=scale
    volumes:
      - /data/wxb/toolkit/tool_scale.json:/data/tool_scale.json:ro
    networks:
      - toolnet
    restart: unless-stopped

  # ── 医学单位换算工具（237 个，纯 CPU）────────────────────────────────────────
  tool-unit:
    build: ./med-calc
    image: med-calc:latest
    container_name: tool-unit
    expose:
      - "8000"
    environment:
      - TOOL_JSON_PATH=/data/tool_unit.json
      - TOOL_CATEGORY=unit
    volumes:
      - /data/wxb/toolkit/tool_unit.json:/data/tool_unit.json:ro
    networks:
      - toolnet
    restart: unless-stopped

  # ── MDCalc 医疗计算器（871 个，纯 CPU）────────────────────────────────────────
  tool-mdcalc:
    build: ./mdcalc
    image: mdcalc:latest
    container_name: tool-mdcalc
    expose:
      - "8000"
    environment:
      - TOOL_JSON_PATH=/data/tools_metadata.json
    volumes:
      - /data/wxb/toolkit/tools_metadata.json:/data/tools_metadata.json:ro
    networks:
      - toolnet
    restart: unless-stopped

networks:
  toolnet:
    driver: bridge
